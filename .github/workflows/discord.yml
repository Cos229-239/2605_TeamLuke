name: Discord Push Notifications

on:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Use 'test' to send a setup confirmation post."
        required: false
        default: "test"
      headline:
        description: "Headline override for status posts."
        required: false
        default: ""
      cycle:
        description: "Cycle label for the test post."
        required: false
        default: ""
      repo_label:
        description: "Repo label override for the test post."
        required: false
        default: ""
      summary:
        description: "Status summary text for a branch-status post."
        required: false
        default: ""
      details:
        description: "Status details for a branch-status post."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send push embed
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_INPUT_MODE: ${{ github.event.inputs.mode }}
          WORKFLOW_INPUT_HEADLINE: ${{ github.event.inputs.headline }}
          WORKFLOW_INPUT_CYCLE: ${{ github.event.inputs.cycle }}
          WORKFLOW_INPUT_REPO_LABEL: ${{ github.event.inputs.repo_label }}
          WORKFLOW_INPUT_SUMMARY: ${{ github.event.inputs.summary }}
          WORKFLOW_INPUT_DETAILS: ${{ github.event.inputs.details }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          webhook = os.environ.get("DISCORD_WEBHOOK", "").strip()
          if not webhook:
              raise SystemExit("DISCORD_WEBHOOK is not set")

          event_name = os.environ.get("GITHUB_EVENT_NAME", "").strip()
          input_mode = os.environ.get("WORKFLOW_INPUT_MODE", "").strip().lower()
          input_headline = os.environ.get("WORKFLOW_INPUT_HEADLINE", "").strip()
          input_cycle = os.environ.get("WORKFLOW_INPUT_CYCLE", "").strip()
          input_repo_label = os.environ.get("WORKFLOW_INPUT_REPO_LABEL", "").strip()
          input_summary = os.environ.get("WORKFLOW_INPUT_SUMMARY", "").strip()
          input_details = os.environ.get("WORKFLOW_INPUT_DETAILS", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          branch = os.environ.get("GITHUB_REF_NAME", "").strip()
          actor = os.environ.get("GITHUB_ACTOR", "").strip()
          github_token = os.environ.get("GITHUB_TOKEN", "").strip()
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com").strip() or "https://github.com"
          event_path = os.environ.get("GITHUB_EVENT_PATH", "").strip()

          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          def fetch_commit_files(repo_name: str, sha: str) -> list[str]:
              repo_name = str(repo_name or "").strip()
              sha = str(sha or "").strip()
              if not repo_name or not sha or not github_token:
                  return []
              api_url = f"https://api.github.com/repos/{repo_name}/commits/{sha}"
              req = urllib.request.Request(
                  api_url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "User-Agent": "Mozilla/5.0",
                  },
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = json.loads(response.read().decode("utf-8"))
              except Exception:
                  return []
              results = []
              seen = set()
              for item in list(payload.get("files") or []):
                  file_path = str(item.get("filename") or "").strip()
                  if not file_path or file_path in seen:
                      continue
                  seen.add(file_path)
                  results.append(file_path)
              return results

          def fetch_repo_json(repo_name: str, repo_path: str, ref: str = "main") -> dict:
              repo_name = str(repo_name or "").strip()
              repo_path = str(repo_path or "").strip().lstrip("/")
              ref = str(ref or "").strip() or "main"
              if not repo_name or not repo_path or not github_token:
                  return {}
              api_url = f"https://api.github.com/repos/{repo_name}/contents/{repo_path}?ref={ref}"
              req = urllib.request.Request(
                  api_url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "User-Agent": "Mozilla/5.0",
                  },
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = json.loads(response.read().decode("utf-8"))
              except Exception:
                  return {}
              content = str(payload.get("content", "") or "")
              encoding = str(payload.get("encoding", "") or "").strip().lower()
              if not content or encoding != "base64":
                  return {}
              try:
                  import base64
                  decoded = base64.b64decode(content).decode("utf-8")
                  data = json.loads(decoded)
              except Exception:
                  return {}
              return data if isinstance(data, dict) else {}

          def fetch_branch_compare(repo_name: str, base_branch: str, head_branch: str) -> dict:
              repo_name = str(repo_name or "").strip()
              base_branch = str(base_branch or "").strip()
              head_branch = str(head_branch or "").strip()
              if not repo_name or not base_branch or not head_branch or not github_token:
                  return {"state": "Unknown", "ahead": 0, "behind": 0, "ahead_behind": "—"}
              api_url = f"https://api.github.com/repos/{repo_name}/compare/{base_branch}...{head_branch}"
              req = urllib.request.Request(
                  api_url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "User-Agent": "Mozilla/5.0",
                  },
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = json.loads(response.read().decode("utf-8"))
              except Exception:
                  return {"state": "Unknown", "ahead": 0, "behind": 0, "ahead_behind": "—"}
              ahead = int(payload.get("ahead_by", 0) or 0)
              behind = int(payload.get("behind_by", 0) or 0)
              if ahead > 0 and behind > 0:
                  state = "Diverged"
              elif behind > 0:
                  state = "Behind"
              elif ahead > 0:
                  state = "Ahead"
              else:
                  state = "In Sync"
              return {
                  "state": state,
                  "ahead": ahead,
                  "behind": behind,
                  "ahead_behind": f"+{ahead} / -{behind}",
              }

          notify_config = fetch_repo_json(repo, ".github/discord-notify.json", "main")
          notify_enabled = bool(notify_config.get("enabled", True))
          include = notify_config.get("include", {}) if isinstance(notify_config.get("include", {}), dict) else {}
          branch_policy = notify_config.get("branches", {}) if isinstance(notify_config.get("branches", {}), dict) else {}
          def resolved_title_flag(key_new: str) -> bool:
              if key_new in include:
                  return bool(include[key_new])
              if "title" in include:
                  return bool(include["title"])
              return True

          include_title_team = resolved_title_flag("title_team")
          include_title_action = resolved_title_flag("title_action")
          include_description = bool(include.get("description", True))
          include_branch_name = bool(include.get("branch_name", True))
          include_status = bool(include.get("status", True))
          include_ahead_behind = bool(include.get("ahead_behind", True))
          include_files_changed = bool(include.get("files_changed", True))
          include_commit_message = bool(include.get("commit_message", True))
          include_actor = bool(include.get("actor", True))
          def incl_ts_field(key_prim: str) -> bool:
              if key_prim in include:
                  return bool(include[key_prim])
              granular_stored = ("timestamp_date" in include) or ("timestamp_time" in include)
              if not granular_stored:
                  return bool(include.get("timestamp", True))
              return False

          include_timestamp_date = incl_ts_field("timestamp_date")
          include_timestamp_time = incl_ts_field("timestamp_time")

          def incl_ts_label(key_lab: str) -> bool:
              if key_lab in include:
                  return bool(include[key_lab])
              return True

          include_timestamp_date_label = incl_ts_label("timestamp_date_label")
          include_timestamp_time_label = incl_ts_label("timestamp_time_label")
          include_repo = bool(include.get("repo", True))
          include_push_size = bool(include.get("push_size", True))
          include_commit_author = bool(include.get("commit_author", True))
          include_footer_timestamp = bool(include.get("footer_timestamp", True))
          def part_on(key: str, fallback: str, default: bool = True) -> bool:
              if key in include:
                  return bool(include[key])
              if fallback:
                  return bool(include.get(fallback, default))
              return default

          def infer_cycle_label(repo_name: str) -> str:
              text = str(repo_name or "").strip()
              if "_" in text:
                  prefix = text.split("_", 1)[0].strip()
                  if len(prefix) == 4 and prefix.isdigit():
                      return prefix
              return ""

          def branch_notifications_enabled(branch_name: str) -> bool:
              name = str(branch_name or "").strip()
              if not name:
                  return True
              if name in branch_policy:
                  return bool(branch_policy.get(name))
              if name in ("main", "gh-pages"):
                  return False
              return True

          def scheduled_status_branches() -> list[str]:
              rows = []
              seen = set()
              for name, enabled in list(branch_policy.items()):
                  branch_name = str(name or "").strip()
                  if not branch_name or not enabled:
                      continue
                  if branch_name in ("main", "gh-pages", "dev"):
                      continue
                  lowered = branch_name.lower()
                  if lowered in seen:
                      continue
                  seen.add(lowered)
                  rows.append(branch_name)
              return sorted(rows, key=lambda item: item.lower())

          def state_icon(state_name: str) -> str:
              state = str(state_name or "").strip().lower()
              if state == "diverged":
                  return "⚠️"
              if state == "behind":
                  return "🔻"
              if state == "ahead":
                  return "🔹"
              if state == "in sync":
                  return "✅"
              return "•"

          def build_branch_status_embed(repo_label: str, cycle_label: str, summary_text: str, rows: list[str], headline: str = "") -> dict:
              repo_text = str(repo_label or "repo").strip() or "repo"
              cycle_text = str(cycle_label or "cycle").strip() or "cycle"
              display_rows = [str(row or "").rstrip() for row in list(rows or []) if str(row or "").strip()]
              description_lines = [
                  f"**Cycle**  {cycle_text}",
                  f"**Repo**  {repo_text}",
                  "",
                  "**Branches vs dev**",
                  *(display_rows or ["No tracked branches configured."]),
              ]
              return {
                  "title": headline or "Branch VS Dev Update",
                  "description": "\n".join(description_lines),
                  "color": 5814783,
                  "fields": [
                      {"name": "Summary", "value": summary_text or "No branch summary provided.", "inline": False},
                  ],
                  "timestamp": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              }

          if event_name == "workflow_dispatch" and input_mode == "test":
              test_repo = input_repo_label or repo or "repo"
              test_cycle = input_cycle or "cycle"
              payload = {
                  "embeds": [
                      {
                          "title": f"{test_repo} notifications are live",
                          "description": "This is a setup test post from SupaTewl.",
                          "color": 5814783,
                          "fields": [
                              {"name": "Repo", "value": test_repo, "inline": True},
                              {"name": "Cycle", "value": test_cycle, "inline": True},
                              {"name": "Status", "value": "Webhook saved and ready for push notifications.", "inline": False},
                          ],
                          "timestamp": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      }
                  ]
              }
          elif event_name == "workflow_dispatch" and input_mode == "status":
              if not notify_enabled:
                  raise SystemExit(0)
              status_repo = input_repo_label or repo or "repo"
              status_cycle = input_cycle or "cycle"
              summary_text = input_summary or "No branch summary provided."
              details_rows = [line for line in (input_details or "").splitlines() if line.strip()]
              payload = {
                  "embeds": [
                      build_branch_status_embed(status_repo, status_cycle, summary_text, details_rows, input_headline or "Branch VS Dev Update")
                  ]
              }
          elif event_name == "schedule":
              if not notify_enabled:
                  raise SystemExit(0)
              status_repo = input_repo_label or repo or "repo"
              status_cycle = input_cycle or infer_cycle_label(status_repo) or "cycle"
              tracked = scheduled_status_branches()
              if not tracked:
                  raise SystemExit(0)
              rows = []
              counts = {"Diverged": 0, "Behind": 0, "Ahead": 0, "In Sync": 0, "Unknown": 0}
              for branch_name in tracked:
                  compare = fetch_branch_compare(repo, "dev", branch_name)
                  state_name = str(compare.get("state") or "Unknown").strip() or "Unknown"
                  counts[state_name] = counts.get(state_name, 0) + 1
                  ahead_behind = str(compare.get("ahead_behind") or "—").strip() or "—"
                  rows.append(f"{state_icon(state_name)} **{branch_name}** — {state_name} ({ahead_behind})")
              summary_text = (
                  f"{counts.get('Diverged', 0)} diverged · "
                  f"{counts.get('Behind', 0)} behind · "
                  f"{counts.get('Ahead', 0)} ahead · "
                  f"{counts.get('In Sync', 0)} in sync"
              )
              payload = {
                  "embeds": [
                      build_branch_status_embed(status_repo, status_cycle, summary_text, rows[:20], "Branch VS Dev Update")
                  ]
              }
          else:
              if not notify_enabled:
                  raise SystemExit(0)
              if not branch_notifications_enabled(branch):
                  raise SystemExit(0)
              commits = list(event.get("commits") or [])
              compare_url = (event.get("compare") or "").strip() or f"{server}/{repo}/commits/{branch}"
              head = event.get("head_commit") or {}
              timestamp = (head.get("timestamp") or datetime.now(timezone.utc).isoformat()).replace("+00:00", "Z")
              eastern = ZoneInfo("America/New_York")
              date_part, time_part = "Unknown", "Unknown"

              def discord_push_et_abbr(local_dt):
                  off = local_dt.utcoffset()
                  if off is None:
                      return "ET"
                  h = off.total_seconds() / 3600.0
                  if abs(h + 5) < 0.02:
                      return "EST"
                  if abs(h + 4) < 0.02:
                      return "EDT"
                  tzname = local_dt.strftime("%Z") or ""
                  return tzname.strip() or "ET"

              if timestamp:
                  try:
                      raw_ts = timestamp.replace("Z", "+00:00")
                      parsed = datetime.fromisoformat(raw_ts)
                      if parsed.tzinfo is None:
                          parsed = parsed.replace(tzinfo=timezone.utc)
                      local_et = parsed.astimezone(eastern)
                      tz_abbr = discord_push_et_abbr(local_et)
                      date_part = local_et.strftime("%m/%d/%Y")
                      time_part = f"{local_et.strftime('%H:%M:%S')} {tz_abbr}"
                  except ValueError:
                      date_part, time_part = "Unknown", "Unknown"
              branch_compare = fetch_branch_compare(repo, "dev", branch)
              files_changed = []
              seen_files = set()

              for commit in commits:
                  for bucket in ("added", "modified", "removed"):
                      for path in list(commit.get(bucket) or []):
                          file_path = str(path or "").strip()
                          if not file_path or file_path in seen_files:
                              continue
                          seen_files.add(file_path)
                          files_changed.append(file_path)

              head_sha_full = str(head.get("id") or event.get("after") or "").strip()
              if not files_changed and head_sha_full:
                  files_changed = fetch_commit_files(repo, head_sha_full)

              lines = []
              for commit in commits[:5]:
                  sha = str(commit.get("id") or "")[:7]
                  message = str(commit.get("message") or "").strip().splitlines()[0] if commit.get("message") else "No commit message"
                  author = str((commit.get("author") or {}).get("name") or actor).strip() or actor
                  url = str(commit.get("url") or "").strip()
                  if url.startswith("https://api.github.com/repos/"):
                      url = url.replace("https://api.github.com/repos/", f"{server}/").replace("/commits/", "/commit/")
                  if sha and url:
                      lines.append(f"[`{sha}`]({url}) {message} — {author}")
                  elif sha:
                      lines.append(f"`{sha}` {message} — {author}")
                  else:
                      lines.append(f"{message} — {author}")

              if len(commits) > 5:
                  lines.append(f"...and {len(commits) - 5} more commit(s).")

              file_lines = [f"`{path}`" for path in files_changed[:6]]
              if len(files_changed) > 6:
                  file_lines.append(f"+{len(files_changed) - 6} more")

              head_sha = str(head.get("id") or "")[:7]
              head_message = str(head.get("message") or "").strip().splitlines()[0] if head.get("message") else ""
              head_author = str((head.get("author") or {}).get("name") or actor).strip() or actor
              commit_total = len(commits)
              push_size = f"{commit_total} commit{'s' if commit_total != 1 else ''}"
              cm_hash_on = part_on("p_hash2", "commit_message")
              cm_rest_on = part_on("b_cm_rest", "commit_message")
              commit_message = " ".join(
                  part for part in (
                      f"`{head_sha}`" if cm_hash_on and head_sha else "",
                      head_message if cm_rest_on and head_message else "",
                  ) if part
              ).strip() or "No commit message"

              if lines:
                  description = "\n".join(lines)
              else:
                  desc_hash_on = part_on("p_hash1", "description")
                  desc_rest_on = part_on("p_sumrest", "description")
                  if desc_hash_on and head_sha and commit_url.startswith("http"):
                      head_part = f"[`{head_sha}`]({commit_url})"
                  elif desc_hash_on and head_sha:
                      head_part = f"`{head_sha}`"
                  else:
                      head_part = ""
                  tail_part = f"{head_message} — {head_author}".strip(" —") if desc_rest_on else ""
                  description = " ".join(part for part in (head_part, tail_part) if part).strip() or "A new push was received."
              embed_object = {"color": 5814783}
              if include_title_team and include_title_action:
                  embed_object["title"] = f"{repo} · Push on {branch}"
                  embed_object["url"] = compare_url
              elif include_title_team:
                  embed_object["title"] = repo
                  embed_object["url"] = compare_url
              elif include_title_action:
                  embed_object["title"] = f"Push on {branch}"
                  embed_object["url"] = compare_url
              if include_description:
                  embed_object["description"] = description
              zw = "\u200b"
              embed_fields = []
              unlabeled_value_lines = []
              def flush_unlabeled_value_lines() -> None:
                  if not unlabeled_value_lines:
                      return
                  embed_fields.append({"name": zw, "value": "\n".join(unlabeled_value_lines), "inline": False})
                  unlabeled_value_lines[:] = []
              def append_field(label_key: str, value_key: str, fallback: str, label_text: str, value_text: str, inline: bool) -> None:
                  show_label = part_on(label_key, fallback)
                  show_value = part_on(value_key, fallback)
                  if not show_label and not show_value:
                      return
                  if show_value and not show_label:
                      unlabeled_value_lines.append(str(value_text or "").strip() or zw)
                      return
                  flush_unlabeled_value_lines()
                  embed_fields.append({
                      "name": label_text if show_label else zw,
                      "value": (str(value_text or "").strip() or zw) if show_value else zw,
                      "inline": bool(inline and show_label and show_value),
                  })

              append_field("g_actor_k", "g_actor_v", "actor", "Actor", actor or "Unknown", True)
              if include_timestamp_date:
                  if include_timestamp_date_label:
                      flush_unlabeled_value_lines()
                      embed_fields.append(
                          {
                              "name": "Date",
                              "value": date_part,
                              "inline": True,
                          }
                      )
                  else:
                      unlabeled_value_lines.append(date_part)
              if include_timestamp_time:
                  if include_timestamp_time_label:
                      flush_unlabeled_value_lines()
                      embed_fields.append(
                          {
                              "name": "Time",
                              "value": time_part,
                              "inline": True,
                          }
                      )
                  else:
                      unlabeled_value_lines.append(time_part)
              append_field("g_branch_k", "g_branch_v", "branch_name", "Branch Name", branch or "Unknown", True)
              append_field("g_status_k", "g_status_v", "status", "Status", str(branch_compare.get("state", "Unknown") or "Unknown"), True)
              append_field("g_ab_k", "g_ab_v", "ahead_behind", "Ahead / Behind", str(branch_compare.get("ahead_behind", "—") or "—"), True)
              append_field("g_repo_k", "g_repo_v", "repo", "Repo", repo or "Unknown", True)
              append_field("b_ps_k", "b_ps_v", "push_size", "Push Size", push_size, True)
              append_field("b_cm_k", "b_cm_rest" if cm_rest_on else "p_hash2", "commit_message", "Commit Message", commit_message, False)
              append_field("b_ca_k", "b_ca_v", "commit_author", "Commit Author", head_author or "Unknown", True)
              if file_lines and (part_on("b_fc_k", "files_changed") or part_on("b_fc_v", "files_changed")):
                  append_field("b_fc_k", "b_fc_v", "files_changed", "Files changed", "\n".join(file_lines), False)
              flush_unlabeled_value_lines()
              embed_object["fields"] = embed_fields
              if include_footer_timestamp:
                  embed_object["timestamp"] = timestamp
              payload = {"embeds": [embed_object]}

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as response:
              if response.status >= 300:
                  raise SystemExit(f"Discord webhook failed: HTTP {response.status}")
          PY
